# COBILL — Apache vhost
#
# Installed at /etc/apache2/sites-available/cobill.conf by setup-server.sh.
# After running `certbot --apache -d <domain>`, certbot rewrites this to
# add the matching :443 block; keep both sides in sync if you edit by hand.

<VirtualHost *:80>
    ServerName lecobol.com
    ServerAlias www.lecobol.com
    ServerAdmin webmaster@lecobol.com
    DocumentRoot /opt/cobill/web

    # Pass auth env from /etc/cobill/cobill.env to each CGI.
    PassEnv COBILL_AUTH_HASH
    PassEnv COBILL_AUTH_PASS

    <Directory /opt/cobill/web>
        Options FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # COBOL binaries served as CGI.
    ScriptAlias /cgi-bin/ /opt/cobill/bin/
    <Directory /opt/cobill/bin>
        Options +ExecCGI -Indexes -MultiViews
        SetHandler cgi-script
        Require all granted
    </Directory>

    # Generated PDFs — direct file serving.
    Alias /pdf/ /opt/cobill/pdf/
    <Directory /opt/cobill/pdf>
        Options +FollowSymLinks -Indexes
        AllowOverride None
        Require all granted

        # Block direct access to .ps source files.
        <FilesMatch "\.ps$">
            Require all denied
        </FilesMatch>
    </Directory>

    # Defensive: deny access if data/src ever leaks into DocumentRoot.
    <DirectoryMatch "/opt/cobill/(data|src)">
        Require all denied
    </DirectoryMatch>

    # Hardening: never expose .dat/.idx if anything ever ends up under web/.
    <FilesMatch "\.(dat|idx|cob|cpy|ps)$">
        Require all denied
    </FilesMatch>

    # Security headers (apply globally).
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "geolocation=(), camera=(), microphone=()"
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains" \
        env=HTTPS

    ErrorLog ${APACHE_LOG_DIR}/cobill_error.log
    CustomLog ${APACHE_LOG_DIR}/cobill_access.log combined
</VirtualHost>
